{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2 class="card__title">Загрузка</h2>
  <form class="upload-form"
        hx-post="/upload"
        hx-target="#process-panel"
        hx-swap="innerHTML"
        hx-encoding="multipart/form-data"
        enctype="multipart/form-data">
    <div class="btn-row">
      <label class="file-field">
        <input type="file" name="files"
               accept=".wav,.flac,.mp3,.ogg,.opus,.ape,.m4a,.cue" multiple required>
      </label>
      <button type="submit" class="btn btn--tonal">Загрузить в input/</button>
    </div>
  </form>
</section>

<section class="card card--process">
  <div class="card__head">
    <h2 class="card__title card__title--inline">Обработка</h2>
    <label class="ui-mode-toggle check-row" title="Показать шум, EQ, динамику и нормализацию">
      <input type="checkbox" id="ui-mode-expert" class="ui-mode-expert-cb">
      <span>Эксперт</span>
    </label>
  </div>
  <p class="hint expert-only hidden">Цепочка: шум → частоты → динамика → нормализация → AI (опция) → экспорт.</p>
  <p class="hint ui-mode-simple-hint">AI-улучшение и экспорт в нужный формат.</p>
  <div id="process-panel">
    {% include "process_panel.html" %}
  </div>
</section>

<section class="card">
  <h2 class="card__title">Очередь и история</h2>
  <iframe id="download-frame" name="download-frame" class="download-frame" title=""></iframe>
  <div id="jobs-panel"
       hx-get="/jobs/partial"
       hx-trigger="load, every 3s"
       hx-swap="innerHTML">
    {% include "jobs_table.html" %}
  </div>
</section>
{% endblock %}
