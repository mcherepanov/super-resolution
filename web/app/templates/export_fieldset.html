<fieldset class="block">
  <legend>Экспорт</legend>
  <div class="sr-toggle">
    <span class="sr-toggle__label sr-toggle__label--active">44.1 kHz</span>
    <label class="sr-toggle__control" title="Частота дискретизации">
      <input type="checkbox" class="sr-toggle__input" aria-label="48 kHz">
      <span class="sr-toggle__track" aria-hidden="true"></span>
    </label>
    <span class="sr-toggle__label">48 kHz</span>
  </div>
  <input type="hidden" name="resample_441" value="on">
  <label class="field-inline export-format-row">Формат выхода
    <select name="output_format" class="select-input">
      <option value="wav">WAV</option>
      <option value="flac">FLAC</option>
      <option value="mp3">MP3</option>
      <option value="m4a">M4A</option>
    </select>
  </label>
</fieldset>
