<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Super Resolution{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="toast" class="toast toast--hidden" role="status" aria-live="polite">
    <div class="toast__body" id="toast-body"></div>
    <button type="button" class="toast__close" id="toast-close" aria-label="Закрыть">×</button>
  </div>
  <header class="app-bar">
    <div class="app-bar__inner">
      <h1 class="app-bar__title">Super Resolution</h1>
      <p class="subtitle">Обработка аудио — ffmpeg и FlashSR</p>
      {% if not enhance_available %}
      <p class="mock-banner">Только обработка — AI-улучшение недоступно</p>
      {% endif %}
    </div>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
